<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rebel Allience</title>
  <link rel="stylesheet" href="homepage.css">
</head>
<body>
  <header class="header">
    <div class="header-left">
        <img class="rebel-logo" src="Hero Section - Rebel Alliance Tutorial/Redstarbird.svg">
        <a class="logo-link">Rebel Allience</a>
    </div>
      

    <div class="header-right">
      <a class="header-link">Our Ships</a>
      <a class="header-link">Mission</a>
      <a class="header-link">Donations</a>
      <button class="join-button">JOIN NOW</button>
    </div>
  </header>

  <!-- HERO IMAGE -->
  <img class="hero-image" src="hero-page-rebellion-low-size.png">


  <div class="hero-page">
    <div class="hero-page-left">
      <div class="hero-title">
        It's your universe, it's time to save it
      </div>
      <div class="hero-subtitle">
        The Rebel alliance is fighting to get rid of the evil empire, join the resistance to create a better future for your children.
      </div>
      <button class="hero-join-button">
        JOIN NOW FOR FREE
      </button>
      <div class="social-proof">
        <div class="referral-images">
          <img class="referral-image" src="profile-pictures/baby-yoda.jpeg">
          <img class="referral-image" src="profile-pictures/darth-wader.jpg">
          <img class="referral-image" src="profile-pictures/The_Rock_2023.jpg">
        </div>
        <div class="referral-text">
          Baby Yoda and 4,000 other have already joined
        </div>

      </div>
    </div>
  </div>
</body>
</html>
